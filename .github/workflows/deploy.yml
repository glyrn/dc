# .github/workflows/deploy.yml
name: 🚀 前端自动部署

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: 安装依赖 & 打包
        run: |
          npm ci
          CI=false npm run build

      - name: 校验部署参数
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEST_DIR: ${{ secrets.DEST_DIR }}
        run: |
          test -n "$SERVER_HOST" || { echo "❌ SERVER_HOST 为空"; exit 1; }
          test -n "$SERVER_USER" || { echo "❌ SERVER_USER 为空"; exit 1; }
          test -n "$DEST_DIR" || { echo "❌ DEST_DIR 为空"; exit 1; }

      - name: 启用 SSH Agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 部署到服务器
        run: |
          scp \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            -r build/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEST_DIR }}

      - name: 发送成功邮件通知
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🎉 cutcut 部署成功"
          to: goree.gly@gmail.com
          from: "GitHub Actions <${{ secrets.SMTP_USER }}>"
          body: |
            部署完成啦！
            • 仓库：${{ github.repository }}
            • 分支：${{ github.ref_name }}
            • 提交：${{ github.sha }}
            • 运行：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 发送失败邮件通知
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "❌ cutcut 部署失败"
          to: goree.gly@gmail.com
          from: "GitHub Actions <${{ secrets.SMTP_USER }}>"
          body: |
            部署失败了，快去看日志：
            • 仓库：${{ github.repository }}
            • 分支：${{ github.ref_name }}
            • 提交：${{ github.sha }}
            • 运行：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
